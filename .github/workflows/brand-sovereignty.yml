name: Brand Sovereignty (Reusable)

# Fails a pull request that introduces cross-org brand identifiers into
# source. Cross-org tooling references (OSS Go imports, container images,
# dep manifests) stay allowed via exempt_paths / exempt_patterns.
#
# Authoritative policy: LP-0010 / HIP-0303 / ZIP-0031 / PIP-0006 / LIP-0006.
#
# How it works:
#   1. Caller passes `org` (one of: lux, hanzo, zoo, pars, liquidity).
#   2. The job installs @luxfi/brand-rules (single source of truth for the
#      per-org banlists) and runs `brand-check <org>` against the PR diff.
#   3. Violations are emitted as GitHub Actions error annotations and the
#      job exits non-zero.
#
# Usage (in any repo, .github/workflows/brand-sovereignty.yml):
#
#   name: Brand Sovereignty
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   jobs:
#     check:
#       uses: hanzoai/.github/.github/workflows/brand-sovereignty.yml@main
#       with:
#         org: hanzo

on:
  workflow_call:
    inputs:
      org:
        description: "Org id whose rule to enforce. One of: lux, hanzo, zoo, pars, liquidity."
        required: true
        type: string
      base-ref:
        description: "Base ref to diff against on pull_request. Defaults to github.base_ref / origin/main."
        required: false
        default: ""
        type: string
      brand-rules-version:
        description: "Version specifier for @luxfi/brand-rules (npm semver). Defaults to ^0.1.0."
        required: false
        default: "^0.1.0"
        type: string

jobs:
  brand-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install @luxfi/brand-rules
        env:
          VERSION: ${{ inputs.brand-rules-version }}
        run: |
          set -euo pipefail
          # Try npm registry first. If the package isn't published yet,
          # fall back to installing straight from the GitHub source.
          if ! npm install -g "@luxfi/brand-rules@${VERSION}" 2>/tmp/npm-install.err; then
            echo "::notice::npm install failed; falling back to GitHub source"
            cat /tmp/npm-install.err >&2 || true
            npm install -g "github:luxfi/brand-rules#main"
          fi
          brand-check --help || true

      - name: Determine base-ref
        id: base
        env:
          BASE_REF_INPUT: ${{ inputs.base-ref }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${PR_BASE_SHA}"
            if [ -z "${BASE_SHA}" ] && [ -n "${BASE_REF_INPUT}" ]; then
              git fetch --no-tags --depth=1 origin "${BASE_REF_INPUT}" || true
              BASE_SHA="$(git rev-parse "origin/${BASE_REF_INPUT}")"
            fi
            if [ -z "${BASE_SHA}" ]; then
              git fetch --no-tags --depth=1 origin "${PR_BASE:-main}" || true
              BASE_SHA="$(git rev-parse "origin/${PR_BASE:-main}")"
            fi
            echo "ref=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Run brand-check
        env:
          ORG: ${{ inputs.org }}
          BASE: ${{ steps.base.outputs.ref }}
        run: |
          set -euo pipefail
          brand-check "${ORG}" "${BASE}"
