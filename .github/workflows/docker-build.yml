name: Docker Build & Push (Reusable)

# Reusable workflow for native multi-arch Docker builds.
# Native ARC runners only — NO GitHub-hosted runners, period.
#   runner-amd64: hanzo-build-linux-amd64 (DO ARC, max 30)
#   runner-arm64: hanzo-build-linux-arm64 (ARC arm64, paused on DOKS — see hanzo LLM.md)
#   runner-deploy: hanzo-deploy-linux-amd64 (DO ARC, max 20)
#
# Cross-org callers (luxfi/*, zooai/*, liquidityio/*) MUST override these
# with their own org's ARC scale-set labels — `hanzoai`-org scale-sets
# are not visible cross-org. Provision a per-org scale-set first
# (see ~/work/hanzo/universe/infra/k8s/arc/) then pass:
#   with:
#     runner-amd64: lux-build-linux-amd64
#     runner-arm64: lux-build-linux-arm64
#     runner-deploy: lux-deploy-linux-amd64
# GitHub-hosted runners are NOT a permitted fallback.
#
# ─── Registry support ────────────────────────────────────────────────
# registry=ghcr.io  (default) → GITHUB_TOKEN login for hanzoai/luxfi/zooai
# registry=us-docker.pkg.dev   → GCP SA JSON in secrets.GCP_CREDENTIAL for liquidityio
#                               (org secret on liquidityio org; pass secrets: inherit)
#
# ─── Multi-image repos ───────────────────────────────────────────────
# Callers with more than one image fan-out via their own matrix:
#
#   jobs:
#     docker:
#       strategy:
#         matrix:
#           include:
#             - image: ghcr.io/hanzoai/chat-api
#               dockerfile: Dockerfile.api
#             - image: ghcr.io/hanzoai/chat-web
#               dockerfile: Dockerfile.web
#       uses: hanzoai/.github/.github/workflows/docker-build.yml@main
#       with:
#         image: ${{ matrix.image }}
#         dockerfile: ${{ matrix.dockerfile }}
#       secrets: inherit
#
# ─── Pre-build steps ─────────────────────────────────────────────────
# For repos that must compile a binary before the Dockerfile COPYs it
# (e.g. hanzo/dns), pass `pre-build-command` — it runs on each arch
# runner before `docker buildx build`.
#
# Usage — simple single-image GHCR:
#
#   jobs:
#     docker:
#       uses: hanzoai/.github/.github/workflows/docker-build.yml@main
#       with:
#         image: ghcr.io/hanzoai/myservice
#       secrets: inherit

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name (e.g. ghcr.io/hanzoai/bot, us-docker.pkg.dev/liquidity-registry/liquidityio/mpc)"
        required: true
        type: string
      registry:
        description: "Container registry (ghcr.io or us-docker.pkg.dev)"
        default: "ghcr.io"
        type: string
      context:
        description: "Docker build context"
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path relative to context"
        default: "Dockerfile"
        type: string
      build-args:
        description: "Docker build args (multiline KEY=VALUE)"
        default: ""
        type: string
      target:
        description: "Docker build target stage"
        default: ""
        type: string
      platforms:
        description: "Comma-separated platforms to build"
        default: "linux/amd64,linux/arm64"
        type: string
      push:
        description: "Push images to registry"
        default: true
        type: boolean
      pre-build-command:
        description: "Shell command to run before docker buildx build (e.g. 'go build -o dns-server ./cmd/dns')"
        default: ""
        type: string
      deploy:
        description: "Deploy after build (kubectl rollout restart)"
        default: false
        type: boolean
      deploy-deployment:
        description: "K8s deployment name for rollout restart"
        default: ""
        type: string
      deploy-namespace:
        description: "K8s namespace for deployment"
        default: "hanzo"
        type: string
      deploy-timeout:
        description: "Rollout status timeout"
        default: "300s"
        type: string
      tag-suffix:
        description: "Extra suffix for tags (e.g. -slim)"
        default: ""
        type: string
      cache-key:
        description: "Registry cache key prefix (defaults to image name)"
        default: ""
        type: string
      runner-amd64:
        description: "Runner label for amd64 builds (ARC). Cross-org callers MUST override with their org's pool."
        default: "hanzo-build-linux-amd64"
        type: string
      runner-arm64:
        description: "Runner label for arm64 builds (ARC). Cross-org callers MUST override with their org's pool."
        default: "hanzo-build-linux-arm64"
        type: string
      runner-deploy:
        description: "Runner label for deploy jobs (ARC). Cross-org callers MUST override with their org's pool."
        default: "hanzo-deploy-linux-amd64"
        type: string

    outputs:
      amd64-digest:
        description: "amd64 image digest"
        value: ${{ jobs.build-amd64.outputs.digest }}
      arm64-digest:
        description: "arm64 image digest"
        value: ${{ jobs.build-arm64.outputs.digest }}
      manifest-tags:
        description: "Final manifest tags (JSON)"
        value: ${{ jobs.create-manifest.outputs.tags }}

    # Secrets must be declared explicitly so cross-org callers
    # (luxfi/*, zooai/*, liquidityio/*) can pass them. `secrets: inherit`
    # only flows secrets when caller and reusable share the same
    # org/enterprise — without this declaration, GitHub rejects the
    # cross-org workflow_call at startup with no jobs dispatched.
    secrets:
      GCP_CREDENTIAL:
        description: "GCP service-account JSON for Artifact Registry pushes (only required when registry=us-docker.pkg.dev)"
        required: false

jobs:
  # ── amd64 (ARC runner on hanzo-k8s) ──────────────────────────
  build-amd64:
    if: contains(inputs.platforms, 'linux/amd64')
    runs-on: ${{ inputs.runner-amd64 }}
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GAR
        if: inputs.registry == 'us-docker.pkg.dev'
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIAL }}

      - name: Pre-build command
        if: inputs.pre-build-command != ''
        working-directory: ${{ inputs.context }}
        run: ${{ inputs.pre-build-command }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=semver,pattern={{version}},suffix=-amd64${{ inputs.tag-suffix }}
            type=ref,event=branch,suffix=-amd64${{ inputs.tag-suffix }}
            type=ref,event=pr,suffix=-amd64${{ inputs.tag-suffix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.image }}-amd64
          cache-to: type=gha,scope=${{ inputs.image }}-amd64,mode=max
          provenance: false
          push: ${{ inputs.push }}

  # ── arm64 (ARC — GKE T2A Ampere native, hanzo-build-linux-arm64) ───
  build-arm64:
    if: contains(inputs.platforms, 'linux/arm64')
    runs-on: ${{ inputs.runner-arm64 }}
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GAR
        if: inputs.registry == 'us-docker.pkg.dev'
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIAL }}

      - name: Pre-build command
        if: inputs.pre-build-command != ''
        working-directory: ${{ inputs.context }}
        run: ${{ inputs.pre-build-command }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=semver,pattern={{version}},suffix=-arm64${{ inputs.tag-suffix }}
            type=ref,event=branch,suffix=-arm64${{ inputs.tag-suffix }}
            type=ref,event=pr,suffix=-arm64${{ inputs.tag-suffix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/arm64
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ inputs.image }}-arm64
          cache-to: type=gha,scope=${{ inputs.image }}-arm64,mode=max
          provenance: false
          push: ${{ inputs.push }}

  # ── Multi-platform manifest (both platforms) ─────────────────
  create-manifest:
    if: inputs.push && contains(inputs.platforms, 'linux/amd64') && contains(inputs.platforms, 'linux/arm64')
    runs-on: ${{ inputs.runner-amd64 }}
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
      contents: read
      id-token: write
    outputs:
      tags: ${{ steps.meta.outputs.json }}
    steps:
      - name: Login to GHCR
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GAR
        if: inputs.registry == 'us-docker.pkg.dev'
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIAL }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest
        run: |
          IMAGE="${{ inputs.image }}"
          AMD64_DIGEST="${{ needs.build-amd64.outputs.digest }}"
          ARM64_DIGEST="${{ needs.build-arm64.outputs.digest }}"
          echo "Creating manifest for ${IMAGE}"
          echo "  amd64: ${AMD64_DIGEST}"
          echo "  arm64: ${ARM64_DIGEST}"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Tag single-arch image (when only one platform is built) ──
  #
  # When only amd64 OR arm64 is requested, create-manifest is
  # skipped (it requires both). This job ensures the arch-specific
  # image still gets tagged as :latest / :main / :vX.Y.Z.
  #
  # Uses always() because the non-requested arch job is skipped,
  # and GitHub Actions auto-skips dependents of skipped jobs unless
  # always() is present in the if condition.
  #
  tag-single-arch:
    if: >-
      always() &&
      inputs.push &&
      !(contains(inputs.platforms, 'linux/amd64') && contains(inputs.platforms, 'linux/arm64')) &&
      (needs.build-amd64.result == 'success' || needs.build-arm64.result == 'success') &&
      !(needs.build-amd64.result == 'failure' || needs.build-arm64.result == 'failure') &&
      !(needs.build-amd64.result == 'cancelled' || needs.build-arm64.result == 'cancelled')
    runs-on: ${{ inputs.runner-amd64 }}
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Login to GHCR
        if: inputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GAR
        if: inputs.registry == 'us-docker.pkg.dev'
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIAL }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Tag single-arch image
        run: |
          IMAGE="${{ inputs.image }}"
          # Use whichever arch digest is available
          AMD64="${{ needs.build-amd64.outputs.digest }}"
          ARM64="${{ needs.build-arm64.outputs.digest }}"
          DIGEST="${AMD64:-$ARM64}"
          echo "Tagging single-arch image ${IMAGE}@${DIGEST}"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "${IMAGE}@${DIGEST}"
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Deploy (optional) ────────────────────────────────────────
  #
  # Depends on BOTH create-manifest and tag-single-arch.
  # Exactly one of them will run (multi-arch vs single-arch);
  # the other is skipped. We use always() so a skipped dependency
  # does not auto-skip deploy, then explicitly check that at least
  # one tagging path succeeded and nothing failed or was cancelled.
  #
  deploy:
    if: >-
      always() &&
      (needs.create-manifest.result == 'success' || needs.tag-single-arch.result == 'success') &&
      !(needs.create-manifest.result == 'failure' || needs.tag-single-arch.result == 'failure') &&
      inputs.deploy && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ${{ inputs.runner-deploy }}
    needs: [create-manifest, tag-single-arch]
    environment: production
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          echo "${PWD}" >> "$GITHUB_PATH"

      - name: Deploy
        env:
          DEPLOYMENT: ${{ inputs.deploy-deployment }}
          NAMESPACE: ${{ inputs.deploy-namespace }}
          TIMEOUT: ${{ inputs.deploy-timeout }}
        run: |
          echo "Deploying ${DEPLOYMENT} in namespace ${NAMESPACE}"
          kubectl rollout restart deployment/${DEPLOYMENT} -n ${NAMESPACE}

          # Poll deployment status using 'kubectl get' (requires only get permission,
          # not watch). This avoids the permission error from 'kubectl rollout status'
          # which requires watch on deployments.
          TIMEOUT_SECS="${TIMEOUT%s}"
          ELAPSED=0
          INTERVAL=10
          echo "Waiting up to ${TIMEOUT_SECS}s for deployment/${DEPLOYMENT} to become available..."
          while [ "${ELAPSED}" -lt "${TIMEOUT_SECS}" ]; do
            AVAILABLE=$(kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} \
              -o jsonpath='{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null || echo "Unknown")
            UPDATED=$(kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} \
              -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || echo "0")
            READY=$(kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED=$(kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "1")
            UNAVAILABLE=$(kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} \
              -o jsonpath='{.status.unavailableReplicas}' 2>/dev/null || echo "")

            echo "[${ELAPSED}s] available=${AVAILABLE} updated=${UPDATED} ready=${READY}/${DESIRED} unavailable=${UNAVAILABLE:-0}"

            if [ "${AVAILABLE}" = "True" ] && [ "${READY}" = "${DESIRED}" ] && [ -z "${UNAVAILABLE}" ]; then
              echo "Deploy complete: ${DEPLOYMENT} rolled out successfully"
              exit 0
            fi

            sleep ${INTERVAL}
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "ERROR: Timed out after ${TIMEOUT_SECS}s waiting for deployment/${DEPLOYMENT}"
          kubectl get deployment/${DEPLOYMENT} -n ${NAMESPACE} -o yaml
          exit 1
